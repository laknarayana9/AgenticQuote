# Prometheus configuration for Agentic Underwriting Platform

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'agentic-underwriting'
    static_configs:
      - targets: ['app:8000']
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 5s

rule_files:
  - "prometheus_rules.yml"
