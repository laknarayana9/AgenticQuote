apiVersion: v1
kind: Secret
metadata:
  name: agenticquote-secrets
  namespace: production
type: Opaque
stringData:
  # Database connection
  database-url: "postgresql://user:password@postgres:5432/agenticquote"
  
  # Redis connection
  redis-url: "redis://redis:6379/0"
  
  # Encryption key (32 bytes for AES-256)
  encryption-key: "your-32-byte-encryption-key-here"
  
  # OpenAI API key
  openai-api-key: "your-openai-api-key-here"
  
  # Provider API keys
  google-maps-api-key: "your-google-maps-api-key"
  corelogic-api-key: "your-corelogic-api-key"
  fema-api-key: "your-fema-api-key"
  lexisnexis-api-key: "your-lexisnexis-api-key"
  
  # OAuth secrets
  oauth-client-id: "your-oauth-client-id"
  oauth-client-secret: "your-oauth-client-secret"
