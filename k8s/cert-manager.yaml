apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@agenticquote.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agenticquote-tls
  namespace: production
spec:
  secretName: agenticquote-tls
  dnsNames:
  - api.agenticquote.com
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
