apiVersion: v1
kind: ConfigMap
metadata:
  name: agenticquote-config
  namespace: production
data:
  # Phase C feature flags
  AGENT_MEMORY_ENABLED: "true"
  AGENT_LEARNING_ENABLED: "true"
  AGENT_PERFORMANCE_TRACKING: "true"
  AGENT_SPECIALIZATION_ENABLED: "true"
  AGENT_COMMUNICATION_ENABLED: "true"
  AGENT_CONFLICT_RESOLUTION_ENABLED: "true"
  
  HITL_SMART_ROUTING: "true"
  HITL_AUTO_APPROVE_ENABLED: "true"
  HITL_AUTO_APPROVE_THRESHOLD: "0.9"
  HITL_ESCALATION_ENABLED: "true"
  HITL_SLA_HOURS: "24"
  HITL_BATCH_PROCESSING: "true"
  HITL_MAX_BATCH_SIZE: "50"
  HITL_QUEUE_MANAGEMENT: "true"
  HITL_ANALYTICS_ENABLED: "true"
  
  ANALYTICS_ENABLED: "true"
  PERFORMANCE_ANALYTICS_ENABLED: "true"
  DECISION_QUALITY_ENABLED: "true"
  PREDICTIVE_ANALYTICS_ENABLED: "true"
  TREND_ANALYSIS_ENABLED: "true"
  AB_TESTING_ENABLED: "true"
  
  RBAC_ENABLED: "true"
  AUDIT_LOGGING_ENABLED: "true"
  ENCRYPTION_ENABLED: "true"
  PII_HANDLING_ENABLED: "true"
  COMPLIANCE_REPORTING_ENABLED: "true"
  
  REGRESSION_TESTING_ENABLED: "false"
  CHAOS_ENGINEERING_ENABLED: "false"
  LOAD_TESTING_ENABLED: "false"
  DECISION_VALIDATION_ENABLED: "true"
  CICD_ENABLED: "true"
  
  # Provider configuration
  PROVIDER_MODE: "real"
  PROVIDER_CACHE_ENABLED: "true"
  PROVIDER_CACHE_TTL: "3600"
