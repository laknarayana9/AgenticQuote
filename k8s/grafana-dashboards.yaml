apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: production
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'Default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards
  dashboard-agenticquote.json: |
    {
      "dashboard": {
        "title": "AgenticQuote Overview",
        "panels": [
          {
            "title": "Request Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(http_requests_total[5m])"
              }
            ]
          },
          {
            "title": "Error Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(http_requests_total{status=~\"5..\"}[5m])"
              }
            ]
          },
          {
            "title": "Response Time",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, http_request_duration_seconds_bucket)"
              }
            ]
          },
          {
            "title": "Active Agents",
            "type": "stat",
            "targets": [
              {
                "expr": "count(active_agents)"
              }
            ]
          }
        ]
      }
    }
